services:
  omnivoice-server:
    image: omnivoice-server
    pull_policy: never # only use local image
    build:
      context: .
      dockerfile: Dockerfile.cuda
      # Flip to TORCH_CHANNEL=nightly to pick up the latest Blackwell (sm_120)
      # kernels if the RTX 5090 throws CUDA errors on stable torch 2.8+cu128.
      # args:
      #   TORCH_CHANNEL: nightly
    container_name: omnivoice-server
    ports:
      - "8880:8880"
    volumes:
      # Persist voice profiles between local container restarts. Note: on Salad
      # there are no persistent volumes — cloned profiles vanish on restart.
      - ./profiles:/home/ubuntu/app/profiles
      # Persist all model caches across builds/recreates so weights only download once.
      # OmniVoice uses HF hub, Silero VAD uses torch.hub, and openai-whisper (under
      # SimulStreaming) uses its own ~/.cache/whisper path for .pt files.
      - ./.hf-cache:/home/ubuntu/.cache/huggingface
      - ./.torch-cache:/home/ubuntu/.cache/torch
      - ./.whisper-cache:/home/ubuntu/.cache/whisper
    env_file:
      # Local-only secrets and tokens (gitignored + dockerignored).
      # Put HF_TOKEN=<your_hf_token> and any other secrets here.
      # Safe if the file is missing — docker-compose only errors when required=true.
      - path: .env
        required: false
    environment:
      # Server configuration
      - OMNIVOICE_HOST=0.0.0.0
      - OMNIVOICE_PORT=8880
      - OMNIVOICE_DEVICE=cuda
      - OMNIVOICE_NUM_STEP=32
      - OMNIVOICE_MAX_CONCURRENT=2
      # HF_HUB_OFFLINE=1  # enables server in a no Internet docker config
      # Optional: Enable authentication
      # - OMNIVOICE_API_KEY=your-secret-key
      # Optional: Adjust inference quality
      # - OMNIVOICE_GUIDANCE_SCALE=2.0
      # - OMNIVOICE_DENOISE=true
      # ── STT (Whisper via SimulStreaming) ──
      # OMNIVOICE_STT_MODEL_PATH defaults to "large-v3" in config.py. Override via .env
      # to point at a volume-mounted .pt file for persistence across recreates.
      - OMNIVOICE_STT_ENABLED=true
      - OMNIVOICE_STT_LANGUAGE=en
      - OMNIVOICE_STT_TASK=transcribe
      - OMNIVOICE_STT_BEAMS=1
      - OMNIVOICE_STT_MIN_CHUNK_SIZE=0.5
      - OMNIVOICE_STT_VAD=true
      - OMNIVOICE_STT_MAX_CONCURRENT=1
      # Optional: Logging
      - OMNIVOICE_LOG_LEVEL=info
    restart: unless-stopped
    # VRAM floor with both models loaded: OmniVoice ~2 GB + Whisper large-v3 ~3 GB ≈ 6 GB.
    # Set OMNIVOICE_STT_MODEL_PATH=small (or OMNIVOICE_STT_ENABLED=false) on <=6 GB cards.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8880/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
